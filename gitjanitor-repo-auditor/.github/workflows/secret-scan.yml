name: secret-scan

# Runs GitJanitor on every push and pull request. If it finds a secret at or
# above "high" severity, it exits non-zero and fails the build — blocking the
# change until the secret is removed and rotated.

on: [push, pull_request]

jobs:
  gitjanitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GitJanitor secret scan
        run: python gitjanitor.py . --fail-on high
