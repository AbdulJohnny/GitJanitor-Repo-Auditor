name: secret-scan

# Two jobs:
#   test       — runs the scanner engine's unit tests.
#   gitjanitor — runs GitJanitor on the repo itself, INCLUDING git history, and
#                fails the build on any high/critical finding. History matters:
#                a secret committed and later deleted still lives in history, so
#                we check out the full history (fetch-depth: 0) and pass --history.

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run unit tests
        run: pytest -q

  gitjanitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code (full history so deleted secrets are caught)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run GitJanitor secret scan (working tree + history)
        run: python gitjanitor.py . --history --fail-on high
